<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unplug</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4C6545">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-surface font-sans text-gray-900 antialiased selection:bg-primary selection:text-surface">
    <div id="app" class="relative w-full h-screen overflow-hidden">
      
      <!-- Screen 1: Onboarding -->
      <section id="screen-onboarding" class="screen active flex flex-col justify-center items-center px-6 md:px-12 text-center h-full">
        <div class="max-w-xl mx-auto flex flex-col items-center">
          <h1 class="font-heading text-5xl md:text-7xl font-bold text-primary mb-8 tracking-tight">Disconnect to<br>Reconnect</h1>
          <p class="text-lg md:text-xl text-gray-600 mb-16 leading-relaxed max-w-md">Reclaim your focus. Minimize distractions and engage deeply with your life.</p>
          <button data-goto="timer" class="bg-primary text-surface px-8 py-4 rounded-full font-semibold text-lg hover:opacity-90 transition-opacity active:scale-95 shadow-lg">Start Session</button>
        </div>
      </section>

      <!-- Screen 2: Timer Selection -->
      <section id="screen-timer" class="screen flex flex-col justify-center items-center px-6 h-full bg-surfaceContainer">
        <div class="mb-12 text-center">
          <h2 class="font-heading text-3xl font-bold text-primary mb-2">Set Your Focus</h2>
          <p class="text-gray-600">Drag to adjust the time</p>
        </div>
        
        <!-- Interactive SVG Circular Dial -->
        <div class="relative w-72 h-72 rounded-full flex items-center justify-center mb-16 select-none bg-surface p-4 shadow-sm" id="dial-container">
          <svg class="w-full h-full transform -rotate-90 pointer-events-none" viewBox="0 0 100 100">
            <!-- Background Track -->
            <circle cx="50" cy="50" r="45" fill="none" stroke="#F3F4EE" stroke-width="10" />
            <!-- Active Progress Track -->
            <circle id="dial-progress" cx="50" cy="50" r="45" fill="none" stroke="#4C6545" stroke-width="10" stroke-linecap="round" stroke-dasharray="282.7" stroke-dashoffset="141.35" class="transition-all duration-200" />
          </svg>
          <!-- Display -->
          <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <span id="dial-time" class="font-heading text-5xl font-bold text-primary tabular-nums">30:00</span>
          </div>
          <!-- Tactile Drag Hit Area -->
          <div id="dial-hit-area" class="absolute inset-0 rounded-full cursor-pointer touch-none"></div>
        </div>
        
        <div class="flex gap-4">
          <button data-goto="onboarding" class="text-gray-500 px-6 py-3 font-medium hover:text-gray-900 hover:bg-surfaceContainer transition-colors rounded-full rounded-full">Back</button>
          <button data-goto="active" class="bg-primary text-surface px-8 py-3 rounded-full font-semibold shadow-md active:scale-95 transition-all">Begin</button>
        </div>
      </section>

      <!-- Screen 3: Active Session -->
      <section id="screen-active" class="screen flex flex-col justify-center items-center h-full w-full bg-primary text-surface relative">
        <!-- Abstract shape background for texture -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-20 pointer-events-none">
            <div class="absolute top-1/4 -left-1/4 w-96 h-96 bg-surface rounded-full mix-blend-overlay blur-3xl"></div>
            <div class="absolute bottom-1/4 -right-1/4 w-96 h-96 bg-surface rounded-full mix-blend-overlay blur-3xl"></div>
        </div>

        <div class="z-10 flex flex-col items-center w-full max-w-sm px-6">
          <div class="text-surface/70 uppercase tracking-widest text-sm font-semibold mb-8">Session Active</div>
          
          <!-- Glassmorphic Container -->
          <div class="bg-surface/10 backdrop-blur-xl rounded-3xl p-12 mb-16 w-full flex flex-col items-center shadow-2xl relative overflow-hidden">
            <!-- Subtle interior glow/highlight using background tonal shifts -->
            <div class="absolute inset-0 bg-gradient-to-br from-surface/20 to-transparent pointer-events-none"></div>
            <div id="active-time" class="font-heading text-7xl font-bold tabular-nums mb-4 drop-shadow-sm">30:00</div>
            <div class="w-16 h-1 bg-surface/30 rounded-full"></div>
          </div>
          
          <button data-goto="summary" class="group text-surface/80 hover:text-surface px-8 py-4 bg-surface/10 hover:bg-surface/20 rounded-full backdrop-blur-md transition-all">
            <span class="font-medium whitespace-nowrap">End Early</span>
          </button>
        </div>
      </section>

      <!-- Screen 4: Asymmetric Summary -->
      <section id="screen-summary" class="screen h-full flex flex-col md:flex-row bg-surface">
        
        <!-- Column 1 (Ratio 1) -->
        <div class="w-full md:w-1/3 h-1/2 md:h-full bg-primary flex flex-col justify-between p-8 md:p-12 text-surface">
          <div>
            <h3 class="font-heading text-3xl font-bold mb-2">Session Complete</h3>
            <p class="text-surface/80">Well done.</p>
          </div>
          <div class="mt-12">
            <div class="text-sm uppercase tracking-wider text-surface/60 font-semibold mb-1">Total Focused</div>
            <div id="summary-time" class="font-heading text-5xl font-bold">30m</div>
          </div>
        </div>

        <!-- Column 2 (Ratio 2) -->
        <div class="w-full md:w-2/3 h-1/2 md:h-full bg-surfaceContainer flex flex-col justify-center p-8 md:p-16">
          <div class="max-w-md w-full mx-auto md:mx-0">
             <h4 class="font-heading text-2xl font-semibold text-primary mb-6">Stats & Insights</h4>
             <ul class="space-y-4 font-medium text-gray-700">
               <li class="flex justify-between items-center bg-surface p-4 rounded-xl shadow-sm">
                 <span class="text-gray-500">Focus Score</span>
                 <span class="text-primary font-bold">98%</span>
               </li>
               <li class="flex justify-between items-center bg-surface p-4 rounded-xl shadow-sm">
                 <span class="text-gray-500">Interruptions</span>
                 <span class="text-primary font-bold">0</span>
               </li>
             </ul>
             <div class="mt-12 flex flex-col sm:flex-row gap-4">
                <button data-goto="onboarding" class="bg-primary text-surface px-8 py-3 rounded-full font-semibold hover:opacity-90 transition-opacity">Finish</button>
                <button data-goto="roadmap" class="text-primary bg-surface px-8 py-3 font-medium hover:opacity-90 rounded-full transition-opacity shadow-sm">View Roadmap</button>
             </div>
          </div>
        </div>
      </section>

      <!-- Roadmap Screen -->
      <section id="screen-roadmap" class="screen h-full w-full bg-surface overflow-y-auto">
        <!-- Rendered via roadmap.js -->
        <div id="roadmap-container" class="min-h-full p-6 md:p-12"></div>
      </section>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
